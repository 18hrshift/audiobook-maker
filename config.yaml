# Audiobook Maker Config

input:
  # Path to your book file (PDF, EPUB, MOBI)
  # Can also be passed as CLI argument: python main.py mybook.pdf
  path: ""

output:
  dir: "./output"
  format: "mp3"          # mp3 or wav
  also_make_m4b: true    # Bundle everything into a single .m4b audiobook file

tts:
  # "api" = Mistral cloud (needs MISTRAL_API_KEY in .env)
  # "local" = local Voxtral on GPU (main machine only)
  backend: "api"

  # Active voice profile — must match a key under voice_profiles below
  # Leave as "default" to use Voxtral's built-in voice
  voice: "default"

  # How many characters per TTS chunk (stay under model limits)
  chunk_size: 1000

# Named voice profiles — add as many as you want
# reference_audio: path to a 3-30 second clean audio clip of the voice
voice_profiles:
  default:
    reference_audio: ""     # blank = Voxtral default voice

  # Example: clone your own voice
  # john:
  #   reference_audio: "./voices/john_sample.wav"

  # Example: a specific narrator style
  # narrator:
  #   reference_audio: "./voices/narrator.mp3"

chapter_detection:
  # Detection methods tried in order — first success wins
  methods:
    - bookmarks      # PDF/EPUB built-in TOC (most reliable)
    - font_size      # Headings are larger than body text
    - pattern        # "Chapter 1", "Part I", roman numerals, etc.
    - page_split     # Fallback: split every N pages

  page_split_size: 20  # Pages per chunk when using fallback

text_cleaning:
  remove_headers_footers: true
  fix_hyphenation: true
  normalize_quotes: true
  skip_pages_before_chapter_1: true

preprocessing:
  # Applied to text just before TTS synthesis
  expand_abbreviations: true   # Dr. → Doctor, etc. → etcetera
  convert_numbers: true        # 42 → forty-two (years like 1984 are protected)
  inject_pauses: true          # Ensure paragraph breaks produce natural pauses
